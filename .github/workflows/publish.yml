name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io  # optional: gate behind a GitHub environment with required reviewers
    permissions:
      id-token: write  # required for trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Verify tag matches workspace version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "inline_java") | .version')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match crate version $VERSION"
            exit 1
          fi

      - name: Publish inline_java_core
        run: cargo publish -p inline_java_core --locked

      - name: Publish inline_java_macros
        run: cargo publish -p inline_java_macros --locked

      # crates.io may take a moment to index the dependencies above
      - name: Wait for dependency propagation
        run: sleep 20

      - name: Publish inline_java
        run: cargo publish -p inline_java --locked
